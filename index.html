<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sleep">
  <meta name="theme-color" content="#060a18">
  <title>Sleep Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #060a18;
      --surface:  #101828;
      --surface2: #162033;
      --border:   rgba(130,160,220,0.08);
      --moon-bg:  #0c1a55;
      --moon-hi:  #1e3a8a;
      --sun-bg:   #4a1500;
      --sun-hi:   #7c2d00;
      --text:     #dde6ff;
      --dim:      #5a6d94;
      --gold:     #c9974a;
      --blue:     #4f7fff;
      --indigo:   #818cf8;
      --orange:   #fb923c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; }

    /* ── Starfield ── */
    #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .s { position: absolute; border-radius: 50%; background: #fff; animation: tw var(--d) ease-in-out infinite alternate; }
    @keyframes tw { from { opacity: var(--a); } to { opacity: var(--b); } }

    /* ── Layout ── */
    .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 20px 80px; min-height: 100vh; }

    /* ── Header ── */
    header { text-align: center; padding: 44px 0 28px; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 11px; font-weight: 300; letter-spacing: 8px; text-transform: uppercase; color: var(--dim); }

    /* ── Buttons ── */
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .btn-track {
      border: none; border-radius: 28px; cursor: pointer; padding: 0;
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      font-family: 'Jost', sans-serif; color: rgba(255,255,255,0.8);
      transition: transform 0.12s ease, box-shadow 0.2s ease;
      position: relative; overflow: hidden; user-select: none;
    }
    .btn-track::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    #btnSleep {
      background: radial-gradient(ellipse at 25% 25%, var(--moon-hi), var(--moon-bg));
      box-shadow: 0 0 48px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    #btnWake {
      background: radial-gradient(ellipse at 75% 25%, var(--sun-hi), var(--sun-bg));
      box-shadow: 0 0 48px rgba(251,146,60,0.28), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .btn-track:active { transform: scale(0.95); }
    #btnSleep:active { box-shadow: 0 0 70px rgba(59,130,246,0.55), inset 0 1px 0 rgba(255,255,255,0.06); }
    #btnWake:active  { box-shadow: 0 0 70px rgba(251,146,60,0.55), inset 0 1px 0 rgba(255,255,255,0.06); }

    .btn-icon  { font-size: 52px; line-height: 1; display: block; }
    .btn-label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.55; font-weight: 400; }

    /* Sleeping pulse */
    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 0 48px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.06); }
      50%      { box-shadow: 0 0 80px rgba(59,130,246,0.65), inset 0 1px 0 rgba(255,255,255,0.06); }
    }
    #btnSleep.sleeping { animation: glow-pulse 2.5s ease-in-out infinite; }

    /* ── Status ── */
    .status { text-align: center; min-height: 44px; margin-bottom: 28px; }
    .status-main { font-size: 14px; color: var(--dim); letter-spacing: 0.3px; }
    .status-accent { color: var(--gold); font-weight: 400; }
    .status-sub { font-size: 11px; color: var(--dim); margin-top: 4px; letter-spacing: 0.3px; }

    /* ── Divider ── */
    hr { border: none; border-top: 1px solid var(--border); margin: 0 0 22px; }

    /* ── Section labels ── */
    .section-label {
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      letter-spacing: 6px; text-transform: uppercase; color: var(--dim); margin-bottom: 14px;
    }

    /* ── Range selector ── */
    .range-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .range-btn {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--dim); font-family: 'Jost', sans-serif;
      font-size: 12px; font-weight: 400; letter-spacing: 1px; padding: 9px 4px;
      cursor: pointer; transition: all 0.18s;
    }
    .range-btn.active { background: var(--surface2); border-color: rgba(130,160,220,0.22); color: var(--text); }

    /* ── Charts ── */
    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 18px 16px 14px; margin-bottom: 14px;
    }
    .chart-title {
      font-size: 10px; letter-spacing: 4px; color: var(--dim);
      text-transform: uppercase; margin-bottom: 12px; font-family: 'Jost', sans-serif;
    }
    .chart-wrap { height: 150px; position: relative; }

    /* ── Session cards ── */
    .session-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 13px 14px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 14px;
    }
    .session-day {
      font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300;
      line-height: 1; min-width: 30px; text-align: center; color: var(--dim);
    }
    .session-info { flex: 1; min-width: 0; }
    .session-dur { font-size: 18px; font-weight: 500; color: var(--gold); }
    .session-times { font-size: 12px; color: var(--dim); margin-top: 3px; }
    .session-del {
      background: none; border: none; color: var(--dim); cursor: pointer;
      padding: 6px 8px; border-radius: 6px; opacity: 0.3; font-size: 14px;
      transition: opacity 0.18s; flex-shrink: 0;
    }
    .session-del:hover { opacity: 0.9; }

    /* ── Orphan entries ── */
    .log-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .log-icon { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
    .log-meta { flex: 1; }
    .log-type { font-size: 10px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; }
    .log-time { font-size: 15px; font-weight: 400; margin-top: 2px; }
    .log-del {
      background: none; border: none; color: var(--dim); cursor: pointer;
      padding: 4px 8px; border-radius: 4px; opacity: 0.3;
      font-size: 14px; transition: opacity 0.18s;
    }
    .log-del:hover { opacity: 0.9; }

    /* ── Empty state ── */
    .empty { text-align: center; color: var(--dim); font-size: 13px; padding: 40px 20px; line-height: 1.8; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; z-index: 200;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid rgba(130,160,220,0.15);
      border-radius: 14px; padding: 12px 22px; font-size: 13px;
      letter-spacing: 0.3px; white-space: nowrap;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Add-to-homescreen hint ── */
    .install-hint {
      text-align: center; color: var(--dim); font-size: 11px;
      letter-spacing: 0.5px; padding: 0 0 20px; line-height: 1.7;
    }
  </style>
</head>
<body>

<div id="starfield"></div>

<div class="app">
  <header>
    <div class="logo">Sleep Tracker</div>
  </header>

  <!-- ── Track buttons ── -->
  <div class="buttons">
    <button class="btn-track" id="btnSleep" onclick="logEvent('sleep')">
      <span class="btn-icon">🌙</span>
      <span class="btn-label">Sleep</span>
    </button>
    <button class="btn-track" id="btnWake" onclick="logEvent('wake')">
      <span class="btn-icon">☀️</span>
      <span class="btn-label">Wake</span>
    </button>
  </div>

  <!-- ── Status ── -->
  <div class="status" id="status">
    <div class="status-main">Tap a button to begin tracking</div>
  </div>

  <hr>

  <!-- ── Charts ── -->
  <div class="section-label">History</div>

  <div class="range-row">
    <button class="range-btn active" data-days="7">7D</button>
    <button class="range-btn" data-days="14">14D</button>
    <button class="range-btn" data-days="30">30D</button>
    <button class="range-btn" data-days="0">All</button>
  </div>

  <div class="chart-card">
    <div class="chart-title">Duration · hours of sleep</div>
    <div class="chart-wrap"><canvas id="cDur"></canvas></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Schedule · bedtime &amp; wake time</div>
    <div class="chart-wrap"><canvas id="cSched"></canvas></div>
  </div>

  <!-- ── Log ── -->
  <div class="section-label" style="margin-top:28px;">Log</div>
  <div id="logContainer"></div>

  <!-- ── Install hint ── -->
  <div class="install-hint" style="margin-top:32px;">
    To add to your home screen:<br>
    <strong style="color:var(--text)">iOS Safari</strong> → Share → Add to Home Screen<br>
    <strong style="color:var(--text)">Android Chrome</strong> → Menu → Add to Home Screen
  </div>
</div>

<div id="toast"></div>

<script>
// ── Starfield ────────────────────────────────────────────────────────────────
(function(){
  const el = document.getElementById('starfield');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 's';
    const sz = Math.random() * 1.8 + 0.4;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;`
      + `--d:${2+Math.random()*5}s;--a:${0.08+Math.random()*0.15};--b:${0.4+Math.random()*0.55};`
      + `animation-delay:${Math.random()*5}s;`;
    el.appendChild(s);
  }
})();

// ── PWA Manifest ─────────────────────────────────────────────────────────────
(function(){
  const m = {
    name:'Sleep Tracker', short_name:'Sleep', start_url:'.', display:'standalone',
    background_color:'#060a18', theme_color:'#060a18',
    icons:[{
      src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23060a18'/><text y='82' x='14' font-size='72'>🌙</text></svg>",
      sizes:'any', type:'image/svg+xml'
    }]
  };
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'}));
  document.head.appendChild(link);
})();

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `const C='sleep-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C)));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>r))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

// ── Data ──────────────────────────────────────────────────────────────────────
const KEY = 'sleeplog_v2';
const load  = () => { try { return JSON.parse(localStorage.getItem(KEY))||[]; } catch{ return []; } };
const save  = d => localStorage.setItem(KEY, JSON.stringify(d));
const uid   = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);

function getSessions(entries) {
  const sorted = [...entries].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const sessions = [], pending = {};
  let lastSleep = null;
  for (const e of sorted) {
    if (e.type === 'sleep') { lastSleep = e; }
    else if (e.type === 'wake' && lastSleep) {
      const bed  = new Date(lastSleep.ts);
      const wake = new Date(e.ts);
      sessions.push({
        dateObj: wake,
        date: wake.toLocaleDateString('en-US',{month:'short',day:'numeric'}),
        dayNum: wake.getDate(),
        monthShort: wake.toLocaleDateString('en-US',{month:'short'}),
        bedtime: bed, waketime: wake,
        duration: (wake-bed)/3600000,
        sleepId: lastSleep.id, wakeId: e.id
      });
      lastSleep = null;
    }
  }
  return sessions;
}

function filterSessions(sessions, days) {
  if (!days) return sessions;
  const cut = new Date(); cut.setDate(cut.getDate()-days);
  return sessions.filter(s=>s.dateObj>=cut);
}

function filterEntries(entries, days) {
  if (!days) return entries;
  const cut = new Date(); cut.setDate(cut.getDate()-days);
  return entries.filter(e=>new Date(e.ts)>=cut);
}

// ── Chart helpers ─────────────────────────────────────────────────────────────
const TICK_COLOR = '#5a6d94';
const FONT = { family: 'Jost', size: 11, weight: '300' };
const GRID = { color: 'rgba(255,255,255,0.045)' };
const BORDER_OPT = { display: false };
const BASE_SCALE = { border: BORDER_OPT, grid: GRID, ticks: { color: TICK_COLOR, font: FONT } };

function fmt12(h) {
  const hh = Math.floor(h % 24); const mm = Math.round((h%1)*60);
  const ap = hh>=12?'PM':'AM'; const dh = hh%12||12;
  return `${dh}:${mm.toString().padStart(2,'0')} ${ap}`;
}

function bedDecimal(d) {
  let h = d.getHours() + d.getMinutes()/60;
  if (h < 14) h += 24; // past midnight → 24+
  return h;
}
function wakeDecimal(d) { return d.getHours() + d.getMinutes()/60; }

let durChart, schedChart;

function initCharts() {
  const tip = {
    backgroundColor:'#162033', borderColor:'rgba(130,160,220,0.12)',
    borderWidth:1, titleColor:'#5a6d94', bodyColor:'#dde6ff', padding:10, cornerRadius:8
  };

  durChart = new Chart(document.getElementById('cDur'), {
    type:'bar',
    data:{ labels:[], datasets:[{ data:[], backgroundColor:'rgba(79,127,255,0.75)', borderRadius:6, borderSkipped:false }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ ...tip, callbacks:{ label:c=>{ const h=Math.floor(c.raw),m=Math.round((c.raw-h)*60); return ` ${h}h ${m}m`; } } } },
      scales:{
        x:{ ...BASE_SCALE },
        y:{ ...BASE_SCALE, min:0, suggestedMax:10, ticks:{ ...BASE_SCALE.ticks, callback:v=>`${v}h`, maxTicksLimit:6 } }
      }
    }
  });

  schedChart = new Chart(document.getElementById('cSched'), {
    type:'line',
    data:{
      labels:[],
      datasets:[
        { label:'Bedtime', data:[], borderColor:'#818cf8', backgroundColor:'rgba(129,140,248,0.08)',
          borderWidth:2, pointRadius:3.5, pointBackgroundColor:'#818cf8', tension:0.35, yAxisID:'yL' },
        { label:'Wake',    data:[], borderColor:'#fb923c', backgroundColor:'rgba(251,146,60,0.08)',
          borderWidth:2, pointRadius:3.5, pointBackgroundColor:'#fb923c', tension:0.35, yAxisID:'yR' }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ display:true, labels:{ color:TICK_COLOR, font:FONT, boxWidth:18, boxHeight:2, usePointStyle:true, pointStyle:'line', padding:14 } },
        tooltip:{ ...tip, callbacks:{ label:c=>` ${c.dataset.label}: ${fmt12(c.raw)}` } }
      },
      scales:{
        x:{ ...BASE_SCALE },
        yL:{ position:'left', border:BORDER_OPT, grid:GRID,
             ticks:{ color:'#818cf8', font:FONT, callback:v=>fmt12(v), maxTicksLimit:5 },
             min:18, max:30 },
        yR:{ position:'right', border:BORDER_OPT, grid:{ drawOnChartArea:false },
             ticks:{ color:'#fb923c', font:FONT, callback:v=>fmt12(v), maxTicksLimit:5 },
             min:4, max:13 }
      }
    }
  });
}

function updateCharts(sessions) {
  const labels = sessions.map(s=>s.date);
  durChart.data.labels = labels;
  durChart.data.datasets[0].data = sessions.map(s=>+s.duration.toFixed(2));
  durChart.update();

  schedChart.data.labels = labels;
  schedChart.data.datasets[0].data = sessions.map(s=>+bedDecimal(s.bedtime).toFixed(2));
  schedChart.data.datasets[1].data = sessions.map(s=>+wakeDecimal(s.waketime).toFixed(2));
  schedChart.update();
}

// ── Render log ────────────────────────────────────────────────────────────────
function renderLog(sessions, entries, days) {
  const container = document.getElementById('logContainer');
  const filteredEntries = filterEntries(entries, days);
  const pairedIds = new Set(sessions.flatMap(s=>[s.sleepId, s.wakeId]));
  const orphans = filteredEntries.filter(e=>!pairedIds.has(e.id));

  if (sessions.length===0 && orphans.length===0) {
    container.innerHTML = '<div class="empty">No entries in this range yet.<br>Tap 🌙 when you go to sleep,<br>tap ☀️ when you wake up.</div>';
    return;
  }

  let html = '';
  [...sessions].reverse().forEach(s=>{
    const h=Math.floor(s.duration), m=Math.round((s.duration-h)*60);
    const bedStr  = s.bedtime.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    const wakeStr = s.waketime.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    html+=`<div class="session-card">
      <div class="session-day">${s.dayNum}</div>
      <div class="session-info">
        <div class="session-dur">${h}h ${m}m</div>
        <div class="session-times">🌙 ${bedStr} &nbsp;·&nbsp; ☀️ ${wakeStr}</div>
      </div>
      <button class="session-del" onclick="deleteSession('${s.sleepId}','${s.wakeId}')">✕</button>
    </div>`;
  });

  if (orphans.length) {
    html+=`<div class="section-label" style="margin-top:20px;margin-bottom:12px;">Unmatched</div>`;
    [...orphans].reverse().forEach(e=>{
      const d=new Date(e.ts);
      const ts=d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
      html+=`<div class="log-item">
        <div class="log-icon">${e.type==='sleep'?'🌙':'☀️'}</div>
        <div class="log-meta">
          <div class="log-type">${e.type==='sleep'?'Fell Asleep':'Woke Up'}</div>
          <div class="log-time">${ts}</div>
        </div>
        <button class="log-del" onclick="deleteEntry('${e.id}')">✕</button>
      </div>`;
    });
  }

  container.innerHTML = html;
}

// ── Status bar ────────────────────────────────────────────────────────────────
function updateStatus(entries) {
  const el = document.getElementById('status');
  const btn = document.getElementById('btnSleep');
  if (!entries.length) {
    el.innerHTML='<div class="status-main">Tap a button to begin tracking</div>';
    btn.classList.remove('sleeping'); return;
  }

  const sorted = [...entries].sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const last = sorted[0];
  const lastSleep = sorted.find(e=>e.type==='sleep');
  const lastWake  = sorted.find(e=>e.type==='wake');
  const isSleeping = lastSleep && (!lastWake || new Date(lastSleep.ts)>new Date(lastWake.ts));

  if (isSleeping) {
    btn.classList.add('sleeping');
    const elapsed = (Date.now()-new Date(lastSleep.ts))/3600000;
    const eh=Math.floor(elapsed), em=Math.round((elapsed-eh)*60);
    const since=new Date(lastSleep.ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    el.innerHTML=`<div class="status-main">🌙 Sleeping · <span class="status-accent">${eh}h ${em}m</span></div>`
      +`<div class="status-sub">since ${since}</div>`;
  } else {
    btn.classList.remove('sleeping');
    const d = new Date(last.ts);
    const ts = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    const icon = last.type==='sleep'?'🌙':'☀️';
    const verb = last.type==='sleep'?'Fell asleep':'Woke up';
    el.innerHTML=`<div class="status-main">${icon} ${verb} at <span class="status-accent">${ts}</span></div>`;
  }
}

// ── Range selector ────────────────────────────────────────────────────────────
let currentDays = 7;
document.querySelectorAll('.range-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.range-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentDays=+b.dataset.days;
    refresh();
  });
});

// ── Core refresh ──────────────────────────────────────────────────────────────
function refresh() {
  const entries  = load();
  const allSess  = getSessions(entries);
  const filtered = filterSessions(allSess, currentDays);
  updateStatus(entries);
  updateCharts(filtered);
  renderLog(filtered, entries, currentDays);
}

// ── Log event ─────────────────────────────────────────────────────────────────
function logEvent(type) {
  const entries = load();
  entries.push({ type, ts: new Date().toISOString(), id: uid() });
  save(entries);
  const ts = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  toast(type==='sleep'?`🌙 Sleep logged · ${ts}`:`☀️ Wake logged · ${ts}`);
  refresh();
}

function deleteEntry(id) { save(load().filter(e=>e.id!==id)); refresh(); }
function deleteSession(sid,wid) { save(load().filter(e=>e.id!==sid&&e.id!==wid)); refresh(); }

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2400);
}

// ── Init ──────────────────────────────────────────────────────────────────────
initCharts();
refresh();
setInterval(refresh, 60000); // refresh sleeping timer every minute
